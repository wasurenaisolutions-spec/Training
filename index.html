<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAREHOUSE ACADEMY - Quiz</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #C9A84C;
            --surface: #111;
            --bg: #080808;
            --correct-bg: #0d2b1a;
            --correct-text: #4cde8a;
            --wrong-bg: #2b0d0d;
            --wrong-text: #de4c4c;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, .bebas { font-family: 'Bebas Neue', sans-serif; }

        .gold-line {
            height: 2px;
            background: var(--gold);
            width: 100%;
        }

        .option-btn {
            background: var(--surface);
            border: 1px solid #333;
            width: 100%;
            text-align: left;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .correct { background-color: var(--correct-bg) !important; border-color: var(--correct-text) !important; color: var(--correct-text) !important; }
        .wrong { background-color: var(--wrong-bg) !important; border-color: var(--wrong-text) !important; color: var(--wrong-text) !important; }

        .dot { height: 8px; width: 8px; border-radius: 50%; background: #333; }
        .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        
        #welcome-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        /* Tasto chiudi per tornare all'app */
        .close-app {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            text-decoration: none;
            opacity: 0.5;
        }
    </style>
</head>
<body class="p-4 relative">

    <a href="#" onclick="window.close();" class="close-app bebas">✕ CLOSE</a>

    <header class="w-full max-w-md text-center mt-10 mb-4">
        <h1 class="text-5xl mb-2 italic">WAREHOUSE</h1>
        <div class="gold-line mx-auto"></div>
        <div class="flex items-center justify-center gap-2 mt-4 text-gray-500 text-[10px] tracking-widest">
            <span>WEEK 1 • ACADEMY CONTENT</span>
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </header>

    <div class="flex gap-4 mb-6">
        <button onclick="setLang('HR')" class="lang-btn opacity-50 text-xs">HR</button>
        <button id="active-it" onclick="setLang('IT')" class="lang-btn font-bold border-b-2 border-[#C9A84C] text-xs">IT</button>
        <button onclick="setLang('EN')" class="lang-btn opacity-50 text-xs">EN</button>
    </div>

    <div class="flex gap-2 mb-8" id="progress-container"></div>

    <main id="game-container" class="w-full max-w-md">
        <div id="question-card">
            <p id="difficulty" class="text-[10px] uppercase tracking-widest text-[#C9A84C] mb-2 font-bold"></p>
            <h2 id="question-text" class="text-2xl mb-6 leading-tight bebas italic"></h2>
            
            <div id="options-container">
                <button onclick="checkAnswer('A')" id="btn-a" class="option-btn flex justify-between">
                    <span id="text-a"></span><span class="opacity-20 text-xs">A</span>
                </button>
                <button onclick="checkAnswer('B')" id="btn-b" class="option-btn flex justify-between">
                    <span id="text-b"></span><span class="opacity-20 text-xs">B</span>
                </button>
            </div>

            <div id="feedback" class="mt-6 hidden text-center">
                <div id="explanation-box" class="p-4 rounded-xl text-xs mb-4 text-left font-light italic"></div>
                <button onclick="nextQuestion()" id="next-btn-text" class="w-full py-4 bg-white text-black font-bold rounded-xl uppercase text-xs tracking-widest hover:bg-[#C9A84C] transition-colors"></button>
            </div>
        </div>
    </main>

    <div id="result-screen" class="hidden w-full max-w-md text-center py-8">
        <h2 id="finish-title" class="text-5xl mb-2 bebas"></h2>
        <div class="text-7xl font-bold text-[#C9A84C] mb-6 bebas italic" id="final-score"></div>
        <p id="result-message" class="mb-10 text-lg"></p>
        
        <div id="sticker-banner" class="hidden bg-[#C9A84C] text-black p-6 rounded-2xl font-bold mb-10 shadow-lg">
            <p id="banner-text" class="text-sm"></p>
        </div>
        
        <div class="space-y-4">
            <button onclick="location.reload()" id="restart-btn-text" class="w-full text-[#C9A84C] text-[10px] uppercase border border-[#C9A84C]/30 px-8 py-3 rounded-full"></button>
            <br>
            <button onclick="window.close();" class="text-white/40 text-[10px] uppercase tracking-widest pt-4">Torna alla Dashboard</button>
        </div>
    </div>

    <div id="welcome-modal">
        <div class="bg-[#111] border border-[#C9A84C]/20 p-8 rounded-3xl max-w-md w-full text-center shadow-2xl">
            <h2 class="text-4xl mb-2 bebas text-[#C9A84C]">WAREHOUSE ACADEMY</h2>
            <p class="text-[10px] text-gray-500 tracking-widest mb-8 uppercase">Knowledge is Power</p>
            <div class="text-left space-y-4 mb-8 text-sm text-gray-300 border-l-2 border-[#C9A84C]/30 pl-4">
                <p><b>IT:</b> Fai 10/10 e ritira il premio!</p>
                <p><b>HR:</b> Ostvarite 10/10 i preuzmite nagradu!</p>
                <p><b>EN:</b> Score 10/10 and claim reward!</p>
            </div>
            <button onclick="closeModal()" class="w-full py-5 bg-[#C9A84C] text-black font-bold rounded-2xl bebas text-2xl tracking-wider shadow-lg">START QUIZ</button>
        </div>
    </div>

    <script>
        const translations = {
            HR: { finish: "KVIZ ZAVRŠEN!", next: "DALJE", restart: "RESTART", guru: "TI SI FITNESS GURU! 👑", pro: "ODLIČAN REZULTAT! 💪", beginner: "DOBAR POČETAK! 🏋️", tryAgain: "NASTAVI VJEŽBATI! 👊", sticker: "Pokaži screenshot na recepciji!", diffEasy: "Lako", diffMed: "Srednje", diffHard: "Teško" },
            IT: { finish: "QUIZ COMPLETATO!", next: "PROSSIMA", restart: "RICOMINCIA", guru: "SEI UN FITNESS GURU! 👑", pro: "OTTIMO RISULTATO! 💪", beginner: "BUON INIZIO! 🏋️", tryAgain: "CONTINUA AD ALLENARTI! 👊", sticker: "Mostra lo screenshot in reception per lo sticker!", diffEasy: "Facile", diffMed: "Medio", diffHard: "Difficile" },
            EN: { finish: "QUIZ COMPLETED!", next: "NEXT", restart: "RESTART", guru: "YOU ARE A FITNESS GURU! 👑", pro: "GREAT RESULT! 💪", beginner: "GOOD START! 🏋️", tryAgain: "KEEP TRAINING! 👊", sticker: "Show screenshot at reception for your sticker!", diffEasy: "Easy", diffMed: "Medium", diffHard: "Hard" }
        };

        const questions = [
            { difficulty: "diffEasy", it: { q: "Qual è il muscolo motore primario nella panca piana?", a: "Grande Pettorale", b: "Bicipite" }, hr: { q: "Koji je mišić primarni pokretač u Bench Pressu?", a: "Pectoralis Major", b: "Biceps" }, en: { q: "Primary mover in Bench Press?", a: "Pectoralis Major", b: "Biceps" }, correct: "A", source: "NSCA", expl: { it: "Il pettorale è il motore primario.", hr: "Pectoralis major je glavni pokretač.", en: "Pectoralis is the prime mover." } },
            { difficulty: "diffEasy", it: { q: "Cosa significa HIIT?", a: "High-Intensity Interval Training", b: "Heavy Individual Training" }, hr: { q: "Što znači HIIT?", a: "High-Intensity Interval Training", b: "Heavy Individual Training" }, en: { q: "What is HIIT?", a: "High-Intensity Interval Training", b: "Heavy Individual Training" }, correct: "A", source: "ACE", expl: { it: "Allenamento ad alta intensità.", hr: "Trening visokog intenziteta.", en: "High intensity training." } },
            { difficulty: "diffEasy", it: { q: "Funzione del Plank?", a: "Isolare i bicipiti", b: "Stabilizzare il core" }, hr: { q: "Funkcija Planka?", a: "Izolacija bicepsa", b: "Stabilizacija trupa" }, en: { q: "Plank function?", a: "Isolate biceps", b: "Core stabilization" }, correct: "B", source: "Harvard", expl: { it: "Rinforza il core.", hr: "Jača core.", en: "Strengthens core." } },
            { difficulty: "diffEasy", it: { q: "Re degli esercizi gambe?", a: "Squat", b: "Leg Extension" }, hr: { q: "Kralj vježbi za noge?", a: "Čučanj", b: "Leg Extension" }, en: { q: "King of leg exercises?", a: "Squat", b: "Leg Extension" }, correct: "A", source: "NSCA", expl: { it: "Lo squat è fondamentale.", hr: "Čučanj je osnova.", en: "Squat is fundamental." } },
            { difficulty: "diffMed", it: { q: "Cos'è l'ipertrofia?", a: "Perdita grasso", b: "Aumento cellule muscolari" }, hr: { q: "Što je hipertrofija?", a: "Gubitak masti", b: "Rast mišićnih stanica" }, en: { q: "What is hypertrophy?", a: "Fat loss", b: "Muscle cell growth" }, correct: "B", source: "PubMed", expl: { it: "Crescita del volume muscolare.", hr: "Rast mišićnog volumena.", en: "Muscle volume growth." } },
            { difficulty: "diffMed", it: { q: "Fibre attivate a bassa intensità?", a: "Tipo I (Lente)", b: "Tipo II (Rapide)" }, hr: { q: "Vlakna na niskom intenzitetu?", a: "Tip I (Spori)", b: "Tip II (Brzi)" }, en: { q: "Fibers at low intensity?", a: "Type I (Slow)", b: "Type II (Fast)" }, correct: "A", source: "NIH", expl: { it: "Le Tipo I sono resistenti.", hr: "Tip I su izdržljiva.", en: "Type I are for endurance." } },
            { difficulty: "diffMed", it: { q: "Effetto EPOC?", a: "Consumo ossigeno post-esercizio", b: "Calo battito" }, hr: { q: "Što je EPOC?", a: "Potrošnja kisika nakon treninga", b: "Pad otkucaja" }, en: { q: "EPOC effect?", a: "Post-exercise oxygen consumption", b: "Heart rate drop" }, correct: "A", source: "ACE", expl: { it: "Calorie bruciate post-allenamento.", hr: "Kalorije nakon treninga.", en: "Calories burned post-workout." } },
            { difficulty: "diffHard", it: { q: "Sistema per l'esplosività?", a: "ATP-PC", b: "Ossidativo" }, hr: { q: "Sustav za eksplozivnost?", a: "ATP-PC", b: "Oksidativni" }, en: { q: "System for explosiveness?", a: "ATP-PC", b: "Oxidative" }, correct: "A", source: "NSCA", expl: { it: "Energia immediata < 10 sec.", hr: "Energija za < 10 sekundi.", en: "Immediate energy < 10 sec." } },
            { difficulty: "diffHard", it: { q: "Inibizione reciproca?", a: "Contrazione", b: "Rilassamento opposto" }, hr: { q: "Recipročna inhibicija?", a: "Grčenje", b: "Opuštanje suprotnog mišića" }, en: { q: "Reciprocal inhibition?", a: "Contraction", b: "Opposite relaxation" }, correct: "B", source: "NASM", expl: { it: "Il muscolo opposto si rilassa.", hr: "Suprotni mišić se opušta.", en: "Opposite muscle relaxes." } },
            { difficulty: "diffHard", it: { q: "Organo del Golgi?", a: "Rileva tensione", b: "Rileva velocità" }, hr: { q: "Golgi tetivni organ?", a: "Detekcija napetosti", b: "Detekcija brzine" }, en: { q: "Golgi organ?", a: "Detects tension", b: "Detects speed" }, correct: "A", source: "NIH", expl: { it: "Protegge il muscolo.", hr: "Štiti mišić.", en: "Protects the muscle." } }
        ];

        let currentLang = 'IT';
        let currentQuestion = 0;
        let score = 0;

        function initDots() {
            const container = document.getElementById('progress-container');
            container.innerHTML = '';
            for(let i=0; i<10; i++) {
                const dot = document.createElement('div');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                container.appendChild(dot);
            }
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.opacity = btn.innerText === lang ? "1" : "0.5";
                btn.style.borderBottom = btn.innerText === lang ? "2px solid #C9A84C" : "none";
            });
            updateContent();
        }

        function closeModal() { document.getElementById('welcome-modal').style.display = 'none'; }

        function updateContent() {
            const t = translations[currentLang];
            const q = questions[currentQuestion];
            document.getElementById('difficulty').innerText = t[q.difficulty];
            document.getElementById('question-text').innerText = q[currentLang.toLowerCase()].q;
            document.getElementById('text-a').innerText = q[currentLang.toLowerCase()].a;
            document.getElementById('text-b').innerText = q[currentLang.toLowerCase()].b;
            document.getElementById('next-btn-text').innerText = t.next;
        }

        function checkAnswer(choice) {
            const q = questions[currentQuestion];
            const isCorrect = choice === q.correct;
            if (isCorrect) score++;
            
            document.getElementById(`btn-${choice.toLowerCase()}`).classList.add(isCorrect ? 'correct' : 'wrong');
            if(!isCorrect) document.getElementById(`btn-${q.correct.toLowerCase()}`).classList.add('correct');
            
            document.getElementById('btn-a').disabled = true;
            document.getElementById('btn-b').disabled = true;
            
            const fb = document.getElementById('explanation-box');
            fb.innerText = q.expl[currentLang.toLowerCase()];
            fb.className = `p-4 rounded-xl text-xs mb-4 ${isCorrect ? 'bg-[#0d2b1a] text-[#4cde8a]' : 'bg-[#2b0d0d] text-[#de4c4c]'}`;
            document.getElementById('feedback').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < 10) {
                document.getElementById('feedback').classList.add('hidden');
                document.getElementById('btn-a').classList.remove('correct', 'wrong');
                document.getElementById('btn-b').classList.remove('correct', 'wrong');
                document.getElementById('btn-a').disabled = false;
                document.getElementById('btn-b').disabled = false;
                const dots = document.querySelectorAll('.dot');
                dots.forEach((d, i) => d.classList.toggle('active', i === currentQuestion));
                updateContent();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/10`;
            const t = translations[currentLang];
            document.getElementById('finish-title').innerText = t.finish;
            document.getElementById('restart-btn-text').innerText = t.restart;
            let msg = score === 10 ? t.guru : score >= 7 ? t.pro : score >= 4 ? t.beginner : t.tryAgain;
            document.getElementById('result-message').innerText = msg;
            if(score === 10) {
                document.getElementById('sticker-banner').classList.remove('hidden');
                document.getElementById('banner-text').innerText = t.sticker;
            }
        }

        window.onload = () => { initDots(); updateContent(); };
    </script>
</body>
</html>
