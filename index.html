<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse Ronin APP</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/pd0Dsxp2/APP_LOGO.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/pd0Dsxp2/APP_LOGO.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --accent: #facc15; --bg: #000000; --card: #111827; --text: #ffffff; 
            --success: #22c55e; --men: #3b82f6; --women: #a855f7; --reward: #facc15;
            --workout: #ef4444; --academy: #22c55e;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; flex: 1; width: 100%; }
        .header { text-align: center; padding: 20px 0; }
        .logo { max-width: 180px; }
        
        #main-title { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin: 20px 0 10px 5px; color: var(--text); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #1f2937;
            background: #111827; color: #6b7280; font-weight: 900; text-transform: uppercase; cursor: pointer; 
        }
        .tab-btn.active[data-type="M"] { border-color: var(--men); color: var(--men); }
        .tab-btn.active[data-type="F"] { border-color: var(--women); color: var(--women); }
        .tab-btn.active[data-type="R"] { border-color: var(--reward); color: var(--reward); }
        .tab-btn.active[data-type="W"] { border-color: var(--workout); color: var(--workout); }
        .tab-btn.active[data-type="A"] { border-color: var(--academy); color: var(--academy); }

        .client-card { 
            background: var(--card); padding: 18px; border-radius: 15px; 
            margin-bottom: 12px; border: 1px solid #1f2937; display: flex; align-items: center; gap: 12px; 
        }
        .border-M { border-left: 5px solid var(--men); }
        .border-F { border-left: 5px solid var(--women); }
        .border-R { border-left: 5px solid var(--reward); }
        .border-W { border-left: 5px solid var(--workout); }
        .border-A { border-left: 5px solid var(--academy); }

        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .client-name { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; flex-grow: 1; }
        .badge-img-large { width: 60px; height: 60px; object-fit: contain; }
        
        #workout-view, #board-view { display: none; }
        .back-btn { background: #1f2937; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; font-weight: bold; }
        
        .board-card { background: #0a0a0a; border: 1px solid #1f2937; border-radius: 20px; padding: 25px; }
        .board-text { white-space: pre-wrap; line-height: 1.6; margin-bottom: 20px; }
        
        /* TASTO LINK ESTERNO */
        .external-link-btn {
            display: none; width: 100%; padding: 15px; background: var(--success); 
            color: white; text-decoration: none; border-radius: 12px; 
            text-align: center; font-weight: bold; text-transform: uppercase;
        }

        .accordion { background: var(--card); border: 1px solid #1f2937; border-radius: 12px; margin-bottom: 10px; }
        .acc-header { padding: 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .acc-content { display: none; padding: 15px; background: #080c14; }
        .active .acc-content { display: block; }
        .ex-row { padding: 10px 0; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
        .upgrade-btn { background: #1f2937; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        .ex-weight { color: var(--accent); font-weight: 900; font-size: 1.2rem; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.postimg.cc/Gt2531hd/Title_(Return_Address_Labels)_(Stickers_(Square))_(Stickers_(Rectangle)_(Landscape)).png" class="logo">
    </div>

    <div id="home-view">
        <h2 id="main-title">Personal Records</h2>
        <div class="tabs">
            <button class="tab-btn" data-type="M" onclick="switchTab('M')">MEN</button>
            <button class="tab-btn" data-type="F" onclick="switchTab('F')">WOMEN</button>
        </div>
        
        <h2 id="main-title">Warehouse Academy</h2>
        <div class="tabs">
            <button class="tab-btn" style="flex: 2;" data-type="A" onclick="switchTab('A')">Warehouse Academy</button>
        </div>

        <h2 id="main-title">Rewards & Workouts</h2>
        <div class="tabs">
            <button class="tab-btn" data-type="R" onclick="switchTab('R')">BADGES</button>
            <button class="tab-btn" data-type="W" onclick="switchTab('W')">WORKOUTS</button>
        </div>

        <div id="client-list"></div>
    </div>

    <div id="workout-view">
        <button class="back-btn" onclick="showHome()">← BACK</button>
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <img id="detail-img" src="" class="profile-img">
            <h2 id="detail-name" style="text-transform:uppercase;"></h2>
        </div>
        <div id="workout-content"></div>
    </div>

    <div id="board-view">
        <button class="back-btn" onclick="showHome()">← BACK</button>
        <div style="text-align:center; margin-bottom:20px;">
            <img id="board-img" src="" style="width:80px; height:80px; object-fit:contain;">
            <h2 id="board-title" style="text-transform:uppercase; color:var(--accent);"></h2>
        </div>
        <div class="board-card">
            <div id="board-content" class="board-text"></div>
            <a id="board-external-link" href="#" target="_blank" class="external-link-btn">Guarda Ora</a>
        </div>
    </div>
</div>

<script>
    const athletesUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=719192490&single=true&output=csv'; 
    const exercisesUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=0&single=true&output=csv';
    const badgesLibUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=660633997&single=true&output=csv';
    const baseWorkoutsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=362105029&single=true&output=csv';
    const academyUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=1523784741&single=true&output=csv';

    let athletesData = {}, workoutData = {}, badgesLibrary = [], baseWorkouts = [], academyData = [], currentTab = null;

    function parseCSV(text) {
        const rows = []; let row = []; let col = ""; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"' && inQuotes && text[i+1] === '"') { col += '"'; i++; }
            else if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { row.push(col.trim()); col = ""; }
            else if (char === '\n' && !inQuotes) { row.push(col.trim()); rows.push(row); row = []; col = ""; }
            else col += char;
        }
        if (col || row.length > 0) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    async function loadData() {
        const t = Date.now();
        try {
            const [aR, eR, bR, wR, acR] = await Promise.all([
                fetch(athletesUrl + '&t=' + t).then(r => r.text()),
                fetch(exercisesUrl + '&t=' + t).then(r => r.text()),
                fetch(badgesLibUrl + '&t=' + t).then(r => r.text()),
                fetch(baseWorkoutsUrl + '&t=' + t).then(r => r.text()),
                fetch(academyUrl + '&t=' + t).then(r => r.text()).catch(() => "") 
            ]);

            // Parse Atleti
            parseCSV(aR).slice(1).forEach(cols => {
                if(cols.length >= 3) athletesData[cols[0]] = { photo: cols[1], gender: cols[2].toUpperCase() };
            });

            // Parse Esercizi
            parseCSV(eR).slice(1).forEach(cols => {
                if(cols.length >= 4) {
                    const name = cols[0], area = cols[1], ex = cols[2], load = cols[3];
                    if(!workoutData[name]) workoutData[name] = {};
                    if(!workoutData[name][area]) workoutData[name][area] = [];
                    workoutData[name][area].push({ex, load});
                }
            });

            badgesLibrary = parseCSV(bR).slice(1).map(cols => ({ link: cols[1], note: cols[2] })).filter(b => b.link);
            baseWorkouts = parseCSV(wR).slice(1).map(cols => ({ title: cols[0], desc: cols[1], link: cols[2] }));
            
            if(acR) {
                academyData = parseCSV(acR).slice(1).map(cols => ({
                    title: cols[0], desc: cols[1], img: cols[2], link: cols[3]
                })).filter(a => a.title);
            }
        } catch (e) { console.error(e); }
    }

    function switchTab(type) {
        currentTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`.tab-btn[data-type="${type}"]`);
        if(btn) btn.classList.add('active');
        renderHome();
    }

    function renderHome() {
        const list = document.getElementById('client-list');
        list.innerHTML = '';

        if (currentTab === 'A') {
            academyData.forEach(a => {
                const card = document.createElement('div'); card.className = 'client-card border-A';
                card.onclick = () => showBoard('academy', a);
                card.innerHTML = `<img src="${a.img}" class="badge-img-large"><div class="client-name">${a.title}</div>`;
                list.appendChild(card);
            });
        } else if (currentTab === 'W') {
            baseWorkouts.forEach(w => {
                const card = document.createElement('div'); card.className = 'client-card border-W';
                card.onclick = () => showBoard('workout', w);
                card.innerHTML = `<img src="${w.link}" class="badge-img-large"><div class="client-name">${w.title}</div>`;
                list.appendChild(card);
            });
        } else if (currentTab === 'R') {
            badgesLibrary.forEach(b => {
                const card = document.createElement('div'); card.className = 'client-card border-R';
                card.innerHTML = `<img src="${b.link}" class="badge-img-large"><div class="badge-desc">${b.note || ''}</div>`;
                list.appendChild(card);
            });
        } else {
            Object.keys(athletesData).forEach(name => {
                if(athletesData[name].gender === currentTab) {
                    const card = document.createElement('div'); card.className = `client-card border-${currentTab}`;
                    card.onclick = () => showWorkout(name);
                    card.innerHTML = `<img src="${athletesData[name].photo}" class="profile-img"><div class="client-name">${name}</div>`;
                    list.appendChild(card);
                }
            });
        }
    }

    function showWorkout(name) {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('workout-view').style.display = 'block';
        document.getElementById('detail-name').innerText = name;
        document.getElementById('detail-img').src = athletesData[name].photo;
        const content = document.getElementById('workout-content');
        content.innerHTML = '';
        const data = workoutData[name] || {};
        for(const area in data) {
            const acc = document.createElement('div'); acc.className = 'accordion';
            let exHtml = data[area].map(e => `
                <div class="ex-row">
                    <span class="client-name" style="font-size:0.9rem">${e.ex}</span>
                    <div><span class="ex-weight">${e.load}</span></div>
                </div>`).join('');
            acc.innerHTML = `<div class="acc-header" onclick="this.parentElement.classList.toggle('active')">${area} <span>+</span></div><div class="acc-content">${exHtml}</div>`;
            content.appendChild(acc);
        }
    }

    function showBoard(mode, data) {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('board-view').style.display = 'block';
        document.getElementById('board-title').innerText = data.title;
        document.getElementById('board-img').src = (mode === 'academy') ? data.img : data.link;
        document.getElementById('board-content').innerText = data.desc;
        
        const extLink = document.getElementById('board-external-link');
        if(mode === 'academy' && data.link && data.link !== "#") {
            extLink.href = data.link;
            extLink.style.display = 'block';
        } else {
            extLink.style.display = 'none';
        }
    }

    function showHome() {
        document.getElementById('workout-view').style.display = 'none';
        document.getElementById('board-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
    }

    window.onload = async () => {
        await loadData();
    };
</script>
</body>
</html>
