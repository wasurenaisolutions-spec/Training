<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse Ronin APP</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/pd0Dsxp2/APP_LOGO.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/pd0Dsxp2/APP_LOGO.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --accent: #facc15; --bg: #000000; --card: #111827; --text: #ffffff; 
            --success: #22c55e; --men: #3b82f6; --women: #a855f7; --reward: #facc15;
            --workout: #ef4444; --academy: #f59e0b;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; flex: 1; width: 100%; }
        
        .header { text-align: center; padding: 20px 0; margin-bottom: 15px; }
        .logo { max-width: 180px; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3)); }
        
        #main-title { 
            font-size: 1.1rem; font-weight: 800; font-style: italic; 
            text-transform: uppercase; text-align: left; 
            margin: 20px 0 10px 5px; color: var(--text); letter-spacing: 1px;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 10px; padding: 0 5px; }
        .tab-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #1f2937;
            background: #111827; color: #6b7280; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active[data-type="M"] { border-color: var(--men); color: var(--men); background: #1e3a8a33; }
        .tab-btn.active[data-type="F"] { border-color: var(--women); color: var(--women); background: #581c8733; }
        .tab-btn.active[data-type="R"] { border-color: var(--reward); color: var(--reward); background: #facc1522; }
        .tab-btn.active[data-type="W"] { border-color: var(--workout); color: var(--workout); background: #ef444422; }
        .tab-btn.active[data-type="A"] { border-color: var(--academy); color: var(--academy); background: #f59e0b22; }

        .tab-btn-large { width: 100%; margin-top: 5px; padding: 15px; font-size: 1rem; }

        .client-card { 
            background: var(--card); padding: 18px; border-radius: 15px; 
            margin-bottom: 12px; border: 1px solid #1f2937; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; 
        }
        .client-card.border-M { border-left: 5px solid var(--men); }
        .client-card.border-F { border-left: 5px solid var(--women); }
        .client-card.border-R { border-left: 5px solid var(--reward); cursor: default; }
        .client-card.border-W { border-left: 5px solid var(--workout); }
        .client-card.border-A { border-left: 5px solid var(--academy); }
        
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .client-name { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; flex-grow: 1; }
        .badge-img-large { width: 60px; height: 60px; object-fit: contain; cursor: zoom-in; flex-shrink: 0; }
        
        .board-card { background: #0a0a0a; border: 1px solid #1f2937; border-radius: 20px; padding: 25px; margin-top: 10px; }
        .board-text { white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6; color: #e5e7eb; margin-bottom: 20px; }
        .external-link-btn { 
            display: block; width: 100%; padding: 15px; background: var(--academy); 
            color: black; text-align: center; border-radius: 12px; 
            font-weight: 900; text-decoration: none; text-transform: uppercase;
        }

        #chat-bubble { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; overflow: hidden; border: 2px solid var(--accent); }
        #chat-window { display: none; position: fixed; bottom: 110px; right: 20px; width: 320px; height: 450px; background: var(--card); border: 1px solid #1f2937; border-radius: 15px; flex-direction: column; z-index: 9998; overflow: hidden; }
        #chat-header { background: #1f2937; padding: 12px; font-weight: 900; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; max-width: 80%; }
        .msg-bot { background: #1f2937; border-left: 3px solid var(--accent); color: white; }
        #chat-input-area { padding: 12px; background: #111827; display: flex; gap: 8px; }
        #chat-input { flex: 1; background: #000; border: 1px solid #374151; color: white; padding: 10px; border-radius: 8px; }
        #chat-send { background: var(--accent); border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; }
        #zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        #workout-view, #board-view { display: none; }
        .back-btn { background: #1f2937; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; }
        .accordion { background: var(--card); border: 1px solid #1f2937; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .acc-header { padding: 15px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; }
        .acc-content { display: none; padding: 0 20px 15px; background: #080c14; }
        .active .acc-content { display: block; }
        .ex-row { padding: 12px 0; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
        .ex-weight { color: var(--accent); font-weight: 900; font-size: 1.2rem; margin-right: 10px; }
        .upgrade-btn { background: #1f2937; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }
        .upgrade-btn.sent { background: var(--success); border-color: var(--success); color: white; }
    </style>
</head>
<body>

<div id="zoom-overlay" onclick="this.style.display='none'"><img id="zoom-img" style="max-width:90%; max-height:85%; border:2px solid var(--accent); border-radius:10px;"></div>

<div class="container">
    <div class="header"><img src="https://i.postimg.cc/Gt2531hd/Title_(Return_Address_Labels)_(Stickers_(Square))_(Stickers_(Rectangle)_(Landscape)).png" class="logo"></div>

    <div id="home-view">
        <h2 id="main-title">Personal Records</h2>
        <div class="tabs">
            <button class="tab-btn" data-type="M" onclick="switchTab('M')">MEN</button>
            <button class="tab-btn" data-type="F" onclick="switchTab('F')">WOMEN</button>
        </div>
        
        <h2 id="main-title">Rewards & Workouts</h2>
        <div class="tabs">
            <button class="tab-btn" data-type="R" onclick="switchTab('R')">BADGES</button>
            <button class="tab-btn" data-type="W" onclick="switchTab('W')">WORKOUTS</button>
        </div>

        <div class="tabs">
            <button class="tab-btn tab-btn-large" data-type="A" onclick="switchTab('A')">RONIN ACADEMY</button>
        </div>

        <div id="empty-msg" style="text-align: center; color: #6b7280; margin-top: 40px; font-style: italic;">Select a category</div>
        <div id="client-list"></div>
    </div>

    <div id="workout-view">
        <button class="back-btn" onclick="showHome()">← BACK</button>
        <div id="detail-header" style="display:flex; align-items:center; gap:15px; margin-bottom:20px; border-bottom:1px solid #1f2937; padding-bottom:15px;">
            <img id="detail-img" src="" class="profile-img">
            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                <h2 id="detail-name" style="margin:0; text-transform:uppercase;"></h2>
                <div id="detail-badges" style="display:flex; gap:5px;"></div>
            </div>
        </div>
        <div id="workout-content"></div>
    </div>

    <div id="board-view">
        <button class="back-btn" onclick="showHome()">← BACK</button>
        <div style="text-align:center; margin-bottom:20px;">
            <img id="board-img" src="" style="width:80px; height:80px; object-fit:contain; margin-bottom:10px;" onclick="zoom(this.src)">
            <h2 id="board-title" style="text-transform:uppercase; color:var(--accent); margin:0;"></h2>
        </div>
        <div class="board-card">
            <div id="board-content" class="board-text"></div>
            <a id="board-external-link" href="#" target="_blank" class="external-link-btn" style="display:none;">CLICK HERE</a>
        </div>
    </div>
</div>

<div id="chat-bubble"><img src="https://i.postimg.cc/gk0GSwcm/Bot-Avatar.jpg"></div>
<div id="chat-window">
    <div id="chat-header"><span>WAREHOUSE COACH AI</span><span onclick="toggleChat()" style="cursor:pointer; font-size: 1.5rem;">×</span></div>
    <div id="chat-messages"><div class="msg msg-bot">Dobrodošli! Benvenuto! Welcome!</div></div>
    <div id="chat-input-area"><input type="text" id="chat-input" placeholder="Scrivi qui..."><button id="chat-send" onclick="sendToBot()">OK</button></div>
</div>

<script>
    const athletesUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=719192490&single=true&output=csv'; 
    const exercisesUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=0&single=true&output=csv';
    const badgesLibUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=660633997&single=true&output=csv';
    const baseWorkoutsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=362105029&single=true&output=csv';
    const academyUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzWCvPzB5Gir_rDlyY_DpE0wkSAmk404HCgYC4sSVVH6G2p0fsRg48G6ZpkxYXPz4f1-6y33k2upqs/pub?gid=1384752528&single=true&output=csv';
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwxxPRTrHtTfgPY_eOvEZIQVHMQuEqagJNJS_L0RT_FooxTPWNBUUBVKNW_1y5Kl_Ql/exec';

    let athletesData = {}, workoutData = {}, badgesLibrary = [], baseWorkouts = [], academyData = [], currentTab = null;

    function parseCSV(text) {
        const rows = []; let row = []; let col = ""; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"' && inQuotes && text[i+1] === '"') { col += '"'; i++; }
            else if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { row.push(col.trim()); col = ""; }
            else if (char === '\n' && !inQuotes) { row.push(col.trim()); rows.push(row); row = []; col = ""; }
            else col += char;
        }
        if (col || row.length > 0) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    async function loadData() {
        try {
            const t = Date.now();
            const [aResp, eResp, bResp, wResp, acResp] = await Promise.all([
                fetch(athletesUrl + '&t=' + t).then(r => r.text()),
                fetch(exercisesUrl + '&t=' + t).then(r => r.text()),
                fetch(badgesLibUrl + '&t=' + t).then(r => r.text()),
                fetch(baseWorkoutsUrl + '&t=' + t).then(r => r.text()),
                fetch(academyUrl + '&t=' + t).then(r => r.text())
            ]);
            
            parseCSV(aResp).slice(1).forEach(cols => {
                if(cols.length < 3) return;
                athletesData[cols[0]] = { photo: cols[1], gender: cols[2].toUpperCase(), badges: cols[3] ? cols[3].split(',').map(b => b.trim()).filter(l => l.length > 5) : [] };
            });

            parseCSV(eResp).slice(1).forEach(cols => {
                if(cols.length < 6) return;
                const [name, area, ex, load, , upStr, startW] = cols;
                if(!workoutData[name]) workoutData[name] = {};
                if(!workoutData[name][area]) workoutData[name][area] = [];
                workoutData[name][area].push({ex, load, up: upStr.toUpperCase()==='TRUE', startWeight: startW});
            });

            badgesLibrary = parseCSV(bResp).slice(1).map(cols => ({ title: cols[0], link: cols[1], note: cols[2] })).filter(b => b.link);
            baseWorkouts = parseCSV(wResp).slice(1).map(cols => ({ title: cols[0], desc: cols[1], link: cols[2] }));
            
            // Academy: 1 Titolo, 2 Descrizione, 3 Link Immagine, 4 Link Esterno
            academyData = parseCSV(acResp).slice(1).map(cols => ({
                title: cols[0], desc: cols[1], img: cols[2], external: cols[3]
            })).filter(a => a.title);

            renderHome();
        } catch (e) { console.error("Load Error", e); }
    }

    function switchTab(type) {
        currentTab = type;
        document.getElementById('empty-msg').style.display = 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-type="${type}"]`).classList.add('active');
        renderHome();
    }

    function renderHome() {
        const list = document.getElementById('client-list');
        list.innerHTML = '';
        
        if (currentTab === 'A') {
            academyData.forEach((a, index) => {
                const card = document.createElement('div'); card.className = `client-card border-A`;
                card.onclick = () => showBoard(index, 'A');
                card.innerHTML = `<img src="${a.img || 'https://i.postimg.cc/pd0Dsxp2/APP_LOGO.png'}" class="badge-img-large"><div class="client-name">${a.title}</div>`;
                list.appendChild(card);
            });
        } else if (currentTab === 'W') {
            baseWorkouts.forEach((w, index) => {
                const card = document.createElement('div'); card.className = `client-card border-W`;
                card.onclick = () => showBoard(index, 'W');
                card.innerHTML = `<img src="${w.link}" class="badge-img-large"><div class="client-name">${w.title}</div>`;
                list.appendChild(card);
            });
        } else if (currentTab === 'R') {
            badgesLibrary.forEach(b => {
                const card = document.createElement('div'); card.className = `client-card border-R`;
                card.innerHTML = `<img src="${b.link}" class="badge-img-large" onclick="zoom('${b.link}')"><div class="badge-desc">${b.note || ''}</div>`;
                list.appendChild(card);
            });
        } else {
            Object.keys(athletesData).forEach(name => {
                if(athletesData[name].gender === currentTab) {
                    const card = document.createElement('div'); card.className = `client-card border-${currentTab}`;
                    card.onclick = () => showWorkout(name);
                    card.innerHTML = `<img src="${athletesData[name].photo || 'https://www.w3schools.com/howto/img_avatar.png'}" class="profile-img"><div class="client-name">${name}</div>`;
                    list.appendChild(card);
                }
            });
        }
    }

    function showBoard(index, type) {
        toggleViews('board-view');
        const item = (type === 'W') ? baseWorkouts[index] : academyData[index];
        document.getElementById('board-title').innerText = item.title;
        document.getElementById('board-img').src = (type === 'W' ? item.link : item.img) || 'https://i.postimg.cc/pd0Dsxp2/APP_LOGO.png';
        document.getElementById('board-content').innerText = item.desc;
        const extBtn = document.getElementById('board-external-link');
        if (type === 'A' && item.external && item.external.trim() !== "") { 
            extBtn.href = item.external; 
            extBtn.style.display = 'block'; 
        } else { 
            extBtn.style.display = 'none'; 
        }
    }

    function toggleViews(id) { ['home-view', 'workout-view', 'board-view'].forEach(v => document.getElementById(v).style.display = (v === id ? 'block' : 'none')); }
    function showHome() { toggleViews('home-view'); }
    function zoom(url) { document.getElementById('zoom-img').src = url; document.getElementById('zoom-overlay').style.display = 'flex'; }
    function toggleChat() { const win = document.getElementById('chat-window'); win.style.display = (win.style.display==='flex')?'none':'flex'; }
    
    // (Qui rimangono showWorkout, requestUpgrade etc come nel tuo originale)
    loadData();
</script>
</body>
</html>
